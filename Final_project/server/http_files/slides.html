<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slides</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f4;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 220px;
      background: #ffffff;
      border-right: 1px solid #ccc;
      padding: 12px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .slide-thumb {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      font-size: 12px;
      height: 80px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .slide-thumb.active {
      border-color: #4285f4;
      background: #e8f0fe;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toolbar button,
    .toolbar select,
    .toolbar input[type="color"] {
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    .toolbar button:hover {
      background: #f0f0f0;
    }

    .slide-canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      box-sizing: border-box;
    }

    .slide-canvas {
      width: 960px;
      height: 540px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.12);
      border-radius: 4px;
      padding: 40px;
      box-sizing: border-box;
      outline: none;
      font-size: 24px;
      line-height: 1.5;
    }

    .top-right-nav {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .logout-btn {
      background-color: #000000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-family: sans-serif;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background-color: #181618;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button onclick="addSlide()">+ New slide</button>
    <div id="thumbnails"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button onclick="formatText('bold')"><b>B</b></button>
      <button onclick="formatText('italic')"><i>I</i></button>
      <button onclick="formatText('underline')"><u>U</u></button>

      <select onchange="changeFont(this.value)">
        <option value="">Font</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier New</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Verdana">Verdana</option>
      </select>

      <select onchange="changeSize(this.value)">
        <option value="">Size</option>
        <option value="3">16px</option>
        <option value="4">18px</option>
        <option value="5">24px</option>
        <option value="6">32px</option>
        <option value="7">48px</option>
      </select>

      <input type="color" onchange="changeColor(this.value)" title="Text Color" />

      <button onclick="prevSlide()">Prev</button>
      <button onclick="nextSlide()">Next</button>
      <button onclick="clearSlide()">Clear slide</button>
    </div>

    <div class="slide-canvas-wrap">
      <div class="slide-canvas" id="slide-canvas" contenteditable="true"></div>
    </div>
  </div>

  <div class="top-right-nav">
    <button id="logout-button" class="logout-btn">Log Out</button>
  </div>

  <script>
    function formatText(command) {
      document.execCommand(command, false, null);
    }

    function changeFont(font) {
      document.execCommand("fontName", false, font);
    }

    function changeSize(size) {
      document.execCommand("fontSize", false, size);
    }

    function changeColor(color) {
      document.execCommand("foreColor", false, color);
    }

    function clearSlide() {
      if (confirm("Clear everything on this slide?")) {
        document.getElementById("slide-canvas").innerHTML = "";
        saveCurrentSlide();
        pushState();
      }
    }

    const logoutBtn = document.getElementById('logout-button');
    logoutBtn.addEventListener('click', async () => {
      const confirmLogout = confirm("Are you sure you want to log out?");
      if (confirmLogout) {
        try {
          const response = await fetch('/logout', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              action: 'logout',
              timestamp: Date.now()
            })
          });

          if (response.ok) {
            window.location.href = './index.html';
          } else {
            alert("Logout failed on server.");
          }
        } catch (error) {
          console.error("Error logging out:", error);
          window.location.href = './index.html';
        }
      }
    });

    const params = new URLSearchParams(window.location.search);
    let Name = params.get("file") || prompt("Name of slideshow");
    if (Name && Name.toLowerCase().endsWith(".pptx")) {
      Name = Name.slice(0, -5);
    }
    const OWNER = params.get("owner") || "";
    const ACCESS = params.get("access") || "owner";

    let slides = [];
    let currentIndex = 0;
    let changed = false;
    let editor = null;
    let collabSocket = null;
    let clientId = "";
    let suppressBroadcast = false;

    function fileQuery(extra = {}) {
      return new URLSearchParams({ file: Name, owner: OWNER, ...extra }).toString();
    }

    function combinedState() {
      saveCurrentSlide();
      return slides.join("<!--SLIDE_BREAK-->");
    }

    function applyCombinedState(html) {
      if (html) {
        const parts = html.split("<!--SLIDE_BREAK-->");
        slides = parts.length ? parts : [html];
      } else {
        slides = [];
      }
      ensureAtLeastOneSlide();
      currentIndex = Math.min(currentIndex, slides.length - 1);
      editor.innerHTML = slides[currentIndex];
      renderThumbnails();
      changed = false;
    }

    function lockReadOnly(message) {
      editor.contentEditable = 'false';
      editor.style.opacity = '0.55';
      document.querySelector('.toolbar').style.pointerEvents = 'none';
      document.querySelector('.toolbar').style.opacity = '0.4';
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#1f2937;color:white;text-align:center;padding:14px;font-size:16px;font-weight:bold;z-index:9999';
      banner.textContent = message;
      document.body.prepend(banner);
    }

    function openCollab() {
      const proto = window.location.protocol === "https:" ? "wss" : "ws";
      collabSocket = new WebSocket(`${proto}://${window.location.host}/collab_ws?${fileQuery({ type: 'slide' })}`);
      collabSocket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === "hello") {
          clientId = payload.clientId || "";
          if (typeof payload.state === "string") {
            suppressBroadcast = true;
            applyCombinedState(payload.state);
            suppressBroadcast = false;
          }
          if (payload.access === "view") {
            lockReadOnly("This shared slideshow is view-only.");
          }
        } else if (payload.type === "update" && payload.clientId !== clientId) {
          suppressBroadcast = true;
          applyCombinedState(payload.state || "");
          suppressBroadcast = false;
        }
      };
    }

    function pushState() {
      if (ACCESS === "view" || suppressBroadcast) return;
      if (!collabSocket || collabSocket.readyState !== WebSocket.OPEN) return;
      collabSocket.send(JSON.stringify({ type: "update", state: combinedState() }));
    }

    function renderThumbnails() {
      const thumbs = document.getElementById("thumbnails");
      thumbs.innerHTML = "";
      slides.forEach((html, idx) => {
        const div = document.createElement("div");
        div.className = "slide-thumb" + (idx === currentIndex ? " active" : "");
        div.innerHTML = html || "<span>Empty slide</span>";
        div.onclick = () => goToSlide(idx);
        thumbs.appendChild(div);
      });
    }

    function ensureAtLeastOneSlide() {
      if (slides.length === 0) {
        slides.push("");
        currentIndex = 0;
      }
    }

    function saveCurrentSlide() {
      if (editor && slides.length > 0) {
        slides[currentIndex] = editor.innerHTML;
        renderThumbnails();
      }
    }

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      saveCurrentSlide();
      currentIndex = index;
      editor.innerHTML = slides[currentIndex];
      changed = false;
      renderThumbnails();
    }

    function addSlide() {
      saveCurrentSlide();
      slides.push("");
      currentIndex = slides.length - 1;
      editor.innerHTML = "";
      changed = true;
      renderThumbnails();
      pushState();
    }

    function prevSlide() {
      if (currentIndex > 0) {
        goToSlide(currentIndex - 1);
      }
    }

    function nextSlide() {
      if (currentIndex < slides.length - 1) {
        goToSlide(currentIndex + 1);
      }
    }

    window.onload = function () {
      editor = document.getElementById("slide-canvas");
      editor.addEventListener("input", () => { changed = true; pushState(); });

      // Load existing PPTX content (if any) into slides
      fetch(`/open_slide?${fileQuery()}`)
        .then(response => {
          if (!response.ok) {
            return "";
          }
          return response.text();
        })
        .then(html => {
          applyCombinedState(html);
          openCollab();
        })
        .catch(err => {
          console.error("Failed to load slideshow:", err);
          ensureAtLeastOneSlide();
          editor.innerHTML = slides[0];
          renderThumbnails();
          openCollab();
        });

      if (false) setInterval(async () => {
        if (!changed) return;
        saveCurrentSlide();
        const combined = slides.join("<!--SLIDE_BREAK-->");
        const response = await fetch(`/save_slide?${fileQuery()}`, {
          method: 'POST',
          headers: { 'X-Page-Token': PAGE_TOKEN },
          body: combined
        });
        if (response.ok) {
          changed = false;
        } else if (response.status === 409) {
          editor.contentEditable = 'false';
          editor.style.opacity = '0.4';
          document.querySelector('.toolbar').style.pointerEvents = 'none';
          document.querySelector('.toolbar').style.opacity = '0.4';
          const banner = document.createElement('div');
          banner.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#c0392b;color:white;text-align:center;padding:14px;font-size:16px;font-weight:bold;z-index:9999';
          banner.textContent = 'This slideshow has been displaced by a newer session. Your edits are locked.';
          document.body.prepend(banner);
        }
      }, 5000);
      if (ACCESS === "view") {
        lockReadOnly("This shared slideshow is view-only.");
      }
    };
  </script>
</body>
</html>
